name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build assets
      run: pnpm run build

    - name: Setup SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        SSH_HOST: ${{ secrets.SSH_HOST }}
      run: |
        set -eu

        if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
          echo "::error::SSH_PRIVATE_KEY secret is missing or empty."
          exit 1
        fi

        if [ -z "${SSH_HOST:-}" ]; then
          echo "::error::SSH_HOST secret is missing or empty."
          exit 1
        fi

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        # Preserve multiline private key and strip CRLF if pasted from Windows.
        printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        if [ -n "${SSH_PUBLIC_KEY:-}" ]; then
          printf '%s\n' "$SSH_PUBLIC_KEY" | tr -d '\r' > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa.pub
        fi

        # Normalize host in case protocol/path was accidentally included.
        host="$SSH_HOST"
        host="${host#ssh://}"
        host="${host#https://}"
        host="${host#http://}"
        host="${host%%/*}"

        if [ -z "$host" ]; then
          echo "::error::SSH_HOST is invalid after normalization."
          exit 1
        fi

        ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || {
          echo "::error::ssh-keyscan failed for SSH_HOST='$host'. Verify the host/IP and network access from GitHub Actions."
          exit 1
        }
        chmod 644 ~/.ssh/known_hosts

    - name: Upload built assets
      run: |
        rsync -avz --delete public/build/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/datafutureailcca/datafuture_ai/public/build/

    - name: Deploy
      run: |
        ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} 'bash -s' < ${{ github.workspace }}/.github/workflows/deploy.sh
